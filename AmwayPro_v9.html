<!DOCTYPE html>
<html lang="es">
<head>

<title>AmwayPro</title>
<script>
// ── ELIMINAR Service Workers anteriores que causaban reset de datos ──
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  });
}
if('caches' in window){
  caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));
}
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── PALETA OSCURA ── */
  --bg:#0f0e1a;
  --bg2:#161428;
  --surface:#1e1b33;
  --surface2:#252240;
  --surface3:#2d2952;
  --border:#332f5a;
  --border2:#3d3870;

  --indigo:#818cf8;
  --indigo-d:#6366f1;
  --purple:#a78bfa;
  --green:#34d399;
  --green-d:#059669;
  --amber:#fbbf24;
  --amber-d:#d97706;
  --red:#f87171;
  --red-d:#dc2626;
  --cyan:#22d3ee;

  --text:#f1f0ff;
  --text2:#c4c0e8;
  --muted:#7c78a8;

  --shadow:0 4px 24px rgba(0,0,0,.5);
  --shadow-sm:0 2px 10px rgba(0,0,0,.4);
  --radius:18px;--radius-sm:13px;--radius-xs:9px;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
  --nav-h:66px;
}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);min-height:100%;
  -webkit-font-smoothing:antialiased;overscroll-behavior:none;
  padding-top:var(--st);
}
input,select,button,textarea{font-family:inherit;color:var(--text)}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{display:none}
*{-webkit-tap-highlight-color:transparent;touch-action:manipulation}

/* ── LAYOUT ── */
#app{max-width:480px;margin:0 auto;min-height:100vh}
#header{
  position:sticky;top:0;z-index:200;
  background:rgba(15,14,26,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:12px 16px 10px;
  display:flex;justify-content:space-between;align-items:center;
}
#content{padding:14px;padding-bottom:calc(var(--nav-h) + var(--sb) + 16px)}
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(15,14,26,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);z-index:200;display:flex;
  padding-bottom:var(--sb);
}
.nav-btn{
  flex:1;padding:10px 0 9px;background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  position:relative;
}
.nav-btn::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:0;height:2px;border-radius:0 0 99px 99px;
  background:var(--indigo);transition:width .25s cubic-bezier(.34,1.56,.64,1);
}
.nav-btn.active::after{width:36px}
.nav-icon{font-size:21px;line-height:1;transition:transform .2s}
.nav-btn.active .nav-icon{transform:scale(1.15)}
.nav-label{font-size:10px;font-weight:700;color:var(--muted);transition:color .15s}
.nav-btn.active .nav-label{color:var(--indigo)}

.card{
  background:var(--surface);border-radius:var(--radius);padding:16px;
  border:1px solid var(--border);margin-bottom:12px;
  box-shadow:var(--shadow-sm);
}
.stat-card{

.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:28px}

/* ── SEARCH ── */

  transition:border-color .15s;

.cliente-avatar{
  width:40px;height:40px;border-radius:50%;

<body>
<div id="offline-banner">📴 Sin conexión — Modo offline activo</div>
<div id="app"></div>
<div id="toast"></div>
<script>
'use strict';

window.addEventListener('online', ()=>document.getElementById('offline-banner').style.display='none');
window.addEventListener('offline',()=>document.getElementById('offline-banner').style.display='block');

// ═══════════════════════════════════════════════
// PERSISTENCIA BLINDADA — Triple capa:
//   1. localStorage  (síncrono, siempre disponible)
//   2. IndexedDB     (asíncrono, mayor capacidad)
//   3. sessionStorage (sobrevive cambios de pestaña en la misma sesión)
// Se guarda automáticamente al cambiar/ocultar pestaña.
// ═══════════════════════════════════════════════
const DB_NAME='AmwayProDB', DB_VER=1;
let _db=null;

function openDB(){
  return new Promise((res,rej)=>{
    if(_db){res(_db);return}
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('kv'))
        db.createObjectStore('kv',{keyPath:'k'});
    };
    req.onsuccess=e=>{_db=e.target.result;res(_db)};
    req.onerror=()=>rej(req.error);
  });
}

// Guardar síncronamente en localStorage Y sessionStorage, luego en IDB
async function dbSet(k,v){
  const json=JSON.stringify(v);
  // 1. localStorage — persiste entre sesiones
  try{localStorage.setItem(k,json)}catch(e){console.warn('LS write',e)}
  // 2. sessionStorage — sobrevive cambio de pestaña en la misma sesión
  try{sessionStorage.setItem(k,json)}catch(e){}
  // 3. IndexedDB — asíncrono, backup de mayor capacidad
  try{
    const db=await openDB();
    const tx=db.transaction('kv','readwrite');
    tx.objectStore('kv').put({k,v});
  }catch(e){console.warn('IDB write',e)}
}

// Leer: busca en las 3 capas, elige la más completa
async function dbGet(k){
  let fromLS=null,fromSS=null,fromIDB=null;
  try{const v=localStorage.getItem(k);if(v)fromLS=JSON.parse(v)}catch(e){}
  try{const v=sessionStorage.getItem(k);if(v)fromSS=JSON.parse(v)}catch(e){}
  try{
    const db=await openDB();
    fromIDB=await new Promise((res,rej)=>{
      const tx=db.transaction('kv','readonly');
      const req=tx.objectStore('kv').get(k);
      req.onsuccess=()=>res(req.result?req.result.v:null);
      req.onerror=()=>res(null);
    });
  }catch(e){}
  // Elegir la versión con más datos (array más largo)
  const candidates=[fromLS,fromSS,fromIDB].filter(x=>x!==null);
  if(!candidates.length)return null;
  candidates.sort((a,b)=>{
    const la=Array.isArray(a)?a.length:0;
    const lb=Array.isArray(b)?b.length:0;
    return lb-la;
  });
  return candidates[0];
}

// Guardado de emergencia síncrono (para beforeunload)
function saveSync(){
  try{
    localStorage.setItem('ap_prod',JSON.stringify(S.productos));
    localStorage.setItem('ap_ventas',JSON.stringify(S.ventas));
    localStorage.setItem('ap_clientes',JSON.stringify(S.clientes));
    sessionStorage.setItem('ap_prod',JSON.stringify(S.productos));
    sessionStorage.setItem('ap_ventas',JSON.stringify(S.ventas));
    sessionStorage.setItem('ap_clientes',JSON.stringify(S.clientes));
  }catch(e){}
}

// Guardar cuando el usuario cambia de pestaña, minimiza o cierra
window.addEventListener('beforeunload',saveSync);
window.addEventListener('pagehide',saveSync);
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden')saveSync();
});

// ── EXPORTAR / IMPORTAR datos (respaldo manual) ──
function exportarDatos(){
  const datos={
    version:8,
    fecha:new Date().toISOString(),
    productos:S.productos,
    ventas:S.ventas,
    clientes:S.clientes
  };
  const blob=new Blob([JSON.stringify(datos,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`AmwayPro_backup_${new Date().toISOString().split('T')[0]}.json`;
  a.click();URL.revokeObjectURL(a.href);
  toast('✅ Backup exportado exitosamente');
}
function importarDatos(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=async e=>{
    try{
      const file=e.target.files[0];if(!file)return;
      const text=await file.text();
      const datos=JSON.parse(text);
      if(!datos.productos||!datos.ventas)throw new Error('Formato inválido');
      if(!confirm(`¿Restaurar backup del ${datos.fecha?.split('T')[0]||'?'}? Se reemplazarán todos los datos actuales.`))return;
      S.productos=datos.productos||[...PB];
      S.ventas=datos.ventas||[];
      S.clientes=datos.clientes||[];
      await saveAll();
      toast('✅ Datos restaurados correctamente');
      renderNow();
    }catch(err){toast('❌ Error al importar: '+err.message)}
  };
  input.click();
}

// ═══════════════════════════════════════════════
// DATOS BASE
// ═══════════════════════════════════════════════

let _saveT=null;
function saveAll(){
  clearTimeout(_saveT);
  _saveT=setTimeout(_doSaveNow,500);
}
async function _doSaveNow(){
  await Promise.all([
    dbSet('ap_prod', S.productos),
    dbSet('ap_ventas', S.ventas),
    dbSet('ap_clientes', S.clientes),
  ]);
}

async function loadAll(){
  const [prod, ventas, clientes] = await Promise.all([
    dbGet('ap_prod'),
    dbGet('ap_ventas'),
    dbGet('ap_clientes'),
  ]);
  if(prod && prod.length)   S.productos = prod;
  if(ventas && ventas.length) S.ventas  = ventas;
  if(clientes)              S.clientes  = clientes || [];
  S.ready=true;
  // Re-sincronizar las 3 capas con los datos recuperados
  saveAll();
  renderNow();
}

// HELPERS
// ═══════════════════════════════════════════════
function hoy(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmt(n){if(n===null||n===undefined||isNaN(n))return'—';return'$'+Math.round(n).toLocaleString('es-CO')}
function calcP(p){const b=p.iva?p.costoIBO*1.18:p.costoIBO;return{base:b,p20:Math.round(b*1.2),p25:Math.round(b*1.25),p30:Math.round(b*1.3),pMin:Math.round(b*1.1)}}
function pV(p,n){const c=calcP(p);return n===20?c.p20:n===25?c.p25:c.p30}
function gan(p,n,c){const c2=calcP(p);return(pV(p,n)-c2.base)*c}
function sum(a,k){return a.reduce((s,v)=>s+(v[k]||0),0)}
function estStock(s){
  if(s===0)return{label:'Agotado',e:'🔴',color:'var(--red)',bg:'rgba(248,113,113,.15)'};
  if(s<=3)return{label:'Bajo',e:'🟡',color:'var(--amber)',bg:'rgba(251,191,36,.12)'};
  if(s<=10)return{label:'Normal',e:'🔵',color:'var(--cyan)',bg:'rgba(34,211,238,.1)'};
  return{label:'Bueno',e:'🟢',color:'var(--green)',bg:'rgba(52,211,153,.1)'}
}
function estPago(t,p){
  if(p>=t)return{label:'✅ Pagado',color:'var(--green)',bg:'rgba(52,211,153,.12)'};
  if(p>0)return{label:'🔶 Parcial',color:'var(--amber)',bg:'rgba(251,191,36,.12)'};
  return{label:'⏳ Pendiente',color:'var(--red)',bg:'rgba(248,113,113,.12)'}
}
function carritoTotal(){
  return S.vCarrito.reduce((t,item)=>{
    const p=S.productos.find(x=>x.id===item.productoId);if(!p)return t;
    // Precio custom ignora niveles — se usa el precio exacto cobrado
    const precio=item.precioCustom!=null?item.precioCustom:pV(p,item.nivel);
    const costoBase=calcP(p).base;
    const ganancia=(precio-costoBase)*item.cantidad;
    return{total:t.total+precio*item.cantidad,ganancia:t.ganancia+ganancia};
  },{total:0,ganancia:0});
}
function stockDisp(pid){
  const p=S.productos.find(x=>x.id===pid);if(!p)return 0;
  const en=S.vCarrito.filter(i=>i.productoId===pid&&i.uid!==S._editUID).reduce((s,i)=>s+i.cantidad,0);
  return p.stock-en
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;')}
function initials(nombre){return (nombre||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()}

// ── TOAST ──────────────────────────────────────
let _tt=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.remove('show');
  void el.offsetWidth;el.classList.add('show');
  if(_tt)clearTimeout(_tt);
  _tt=setTimeout(()=>el.classList.remove('show'),2800);
}

    return;
  }

  if(!S.auth){app.innerHTML=rLogin();return}

  const contentEl=document.getElementById('content');
  const navEl=document.getElementById('nav');
  const headerEl=document.getElementById('header');

  if(contentEl&&navEl&&headerEl){
    contentEl.innerHTML=rTab();
    const titleEl=headerEl.querySelector('[data-title]');
    if(titleEl)titleEl.textContent=TABS_TITLE[S.tab];
    navEl.querySelectorAll('.nav-btn').forEach(b=>{

    });

    app.innerHTML=`

      <div>
        <div data-title style="font-size:17px;font-weight:900;color:var(--text);letter-spacing:-.3px">${TABS_TITLE[S.tab]}</div>

        <button class="btn btn-xs btn-outline" onclick="importarDatos()" title="Importar backup" style="border-radius:99px;padding:6px 11px;font-size:12px">📂</button>
        <button class="btn btn-xs btn-danger" onclick="logout()" style="border-radius:99px;padding:7px 14px;font-size:12px">Salir</button>
      </div>
    </div>
    <div id="content">${rTab()}</div>
    <nav id="nav">
      ${Object.entries(TABS_META).map(([t,[icon,label]])=>`
      <button class="nav-btn${S.tab===t?' active':''}" data-tab="${t}" onclick="setTab('${t}')">

}

function rTab(){
  switch(S.tab){
    case'dashboard':return rDash();
    case'venta':return rVenta();
    case'inventario':return rInv();
    case'clientes':return rClientes();
    case'historial':return rHist();
    case'reporte':return rRep();

}

function setTab(t){
  S.tab=t;
  if(t==='venta'){
    S.vPaso=1;S.vGuardada=null;S.vCliente='';S.vFecha=hoy();
    S.vCarrito=[];S.vCarritoErr='';S.vClienteErr='';

    S.vSheetAdd=false;S.vMontoPagado=0;S._editUID=null;S.vSheetCliente=false;
    S.vPrecioCustom='';S.vUsarPrecioCustom=false;
    S.vFecha=hoy(); // sincronizar fecha siempre al abrir nueva venta

  if(t!=='inventario'){S.invSheetP=null;S.invSheetN=false;S.invSheetE=null;}
  render();
}

function pinPress(d){
  if(d==='DEL'){S.pin=S.pin.slice(0,-1);S.pinErr=false;renderNow();return}
  if(S.pin.length>=4)return;
  S.pin+=d;S.pinErr=false;renderNow();
  if(S.pin.length===4){setTimeout(()=>{
    if(S.pin===PIN_A){S.auth='admin';S.pin=''}
    else if(S.pin===PIN_V){S.auth='vendedor';S.pin=''}
    else{S.pinErr=true;S.pin=''}
    renderNow();
  },180)}
}

// Acciones clientes
function guardarNuevoCliente(){
  const n=S.clNuevo;if(!n.nombre.trim())return;
  const c={id:Date.now(),nombre:n.nombre.trim(),telefono:(n.telefono||'').trim(),notas:(n.notas||'').trim(),fechaRegistro:hoy()};
  S.clientes=[...S.clientes,c];
  saveAll();toast(`✅ Cliente "${c.nombre}" registrado`);
  S.clSheetN=false;S.clNuevo={nombre:'',telefono:'',notas:''};renderNow();
}
function abrirEditCliente(id){
  const c=S.clientes.find(x=>x.id===id);if(!c)return;
  S.clSheetE=c;S.clEdit={nombre:c.nombre,telefono:c.telefono||'',notas:c.notas||''};renderNow();
}
function guardarEditCliente(){
  const e=S.clEdit;if(!e.nombre.trim())return;
  S.clientes=S.clientes.map(c=>c.id===S.clSheetE.id?{...c,nombre:e.nombre.trim(),telefono:e.telefono.trim(),notas:e.notas.trim()}:c);
  saveAll();toast(`✅ Cliente actualizado`);S.clSheetE=null;renderNow();
}
function eliminarCliente(id,fromSheet=false){
  const c=S.clientes.find(x=>x.id===id);if(!c)return;
  if(!confirm(`¿Eliminar a "${c.nombre}"?\nSus ventas se conservarán en el historial.`))return;
  S.clientes=S.clientes.filter(x=>x.id!==id);
  saveAll();toast(`🗑️ "${c.nombre}" eliminado`);
  if(fromSheet)S.clSheetE=null;renderNow();
}
function verClienteVentas(id){
  S.clSheetV=S.clientes.find(x=>x.id===id);renderNow();
}

function _updPrecioCustom(){

  if(tgl)tgl.className='toggle'+(S.vUsarPrecioCustom?' on':'');
  const box=document.getElementById('precio-custom-box');

  if(!S.vUsarPrecioCustom){S.vPrecioCustom='';const inp=document.getElementById('precio-custom-input');if(inp)inp.value='';}
  _updPrecioCustomPreview();
}
function _updPrecioCustomPreview(){
  const selP=S.productos.find(p=>p.id===parseInt(S.vSelProdId));
  if(!selP)return;
  const cant=parseInt(S.vSelCant)||0;
  const precioC=parseFloat(S.vPrecioCustom)||0;
  const precio=S.vUsarPrecioCustom&&precioC>0?precioC:pV(selP,S.vSelNivel);
  const base=calcP(selP).base;
  const ganancia=(precio-base)*cant;
  const tv=document.getElementById('sub-total-val');
  const gv=document.getElementById('sub-gan-val');
  const warn=document.getElementById('precio-custom-warn');
  if(tv&&cant>0)tv.textContent='$'+Math.round(precio*cant).toLocaleString('es-CO');
  if(gv){gv.textContent='Ganancia: $'+Math.round(ganancia).toLocaleString('es-CO');gv.style.color=ganancia<0?'var(--red)':'var(--green)';}
  if(warn)warn.style.display=(S.vUsarPrecioCustom&&precioC>0&&precioC<base)?'block':'none';
}

function _togE(){

}
function _updStock(){
  const n=parseInt(S.invAdd)||0;
  const p=S.invSheetP;if(!p)return;
  const lbl=document.getElementById('stock-preview');
  if(lbl)lbl.innerHTML=`Actual: <b style="color:var(--indigo)">${p.stock}</b>${n>0?` → <b style="color:var(--green)">${p.stock+n}</b>`:''} unidades`;
  const btn=document.getElementById('btn-confirStock');
  if(btn)btn.disabled=n<1;
  if(btn)btn.textContent=`✓ Confirmar +${n} unidades`;

function confirStock(){
  const n=parseInt(S.invAdd);if(!n||n<1)return;
  S.productos=S.productos.map(p=>p.id===S.invSheetP.id?{...p,stock:p.stock+n}:p);
  saveAll();toast(`✅ +${n} uds · ${S.invSheetP.nombre}`);
  S.invSheetP=null;S.invAdd='';renderNow();
}
function confirNuevo(){
  const n=S.invNuevo;if(!n.nombre.trim()||!n.costoIBO)return;
  S.productos=[...S.productos,{...n,id:Date.now(),costoIBO:parseFloat(n.costoIBO),stock:0}];
  saveAll();toast(`✅ "${n.nombre}" agregado`);
  S.invSheetN=false;S.invNuevo={nombre:'',tipo:'Cuidado Personal',costoIBO:'',iva:false};renderNow();
}
function abrirEditProd(id){
  const p=S.productos.find(x=>x.id===id);if(!p)return;
  S.invSheetE=p;S.invEdit={nombre:p.nombre,tipo:p.tipo,costoIBO:String(p.costoIBO),iva:p.iva,stock:p.stock};renderNow();
}
function guardarEditProd(){
  const e=S.invEdit;if(!e.nombre.trim()||!e.costoIBO)return;
  S.productos=S.productos.map(p=>p.id===S.invSheetE.id?{...p,nombre:e.nombre.trim(),tipo:e.tipo,costoIBO:parseFloat(e.costoIBO),iva:e.iva,stock:parseInt(e.stock)||0}:p);
  saveAll();toast(`✅ "${e.nombre}" actualizado`);S.invSheetE=null;renderNow();
}
function eliminarProd(id){
  const p=S.productos.find(x=>x.id===id);if(!p)return;
  if(!confirm(`¿Eliminar "${p.nombre}"?`))return;
  S.productos=S.productos.filter(x=>x.id!==id);saveAll();toast(`🗑️ "${p.nombre}" eliminado`);renderNow();
}
function eliminarProdDesdeSheet(id){
  const p=S.productos.find(x=>x.id===id);if(!p)return;
  if(!confirm(`¿Eliminar "${p.nombre}" permanentemente?`))return;
  S.productos=S.productos.filter(x=>x.id!==id);S.invSheetE=null;saveAll();toast(`🗑️ "${p.nombre}" eliminado`);renderNow();
}

function _updPagoDisplay(totalC,ganC){
  const pagado=parseFloat(S.vMontoPagado)||0;
  const saldo=Math.max(0,totalC-pagado);
  const excedente=Math.max(0,pagado-totalC);
  const ep=excedente>0
    ?{label:'💚 Pago con excedente +'+fmt(excedente),bg:'rgba(52,211,153,.12)',color:'var(--green)'}
    :estPago(totalC,pagado);
  const ganTotal=ganC+excedente;
  const box=document.getElementById('pago-status-box');
  const lbl=document.getElementById('pago-status-label');
  const saldoLine=document.getElementById('pago-saldo-line');
  const saldoVal=document.getElementById('pago-saldo-val');
  const ganLine=document.getElementById('pago-gan-line');
  if(box){box.style.background=ep.bg;box.style.borderColor=ep.color+'30';}
  if(lbl){lbl.textContent=ep.label;lbl.style.color=ep.color;}
  if(saldoLine)saldoLine.style.display=saldo>0?'':'none';
  if(saldoVal)saldoVal.textContent=fmt(saldo);
  if(ganLine){ganLine.style.display=excedente>0?'block':'none';ganLine.textContent='🏆 Ganancia total: '+fmt(ganTotal);}
}
// ── DOM selectivo: historial ──
function _calcHRangoFn(){
  const now=new Date();
  const h=hoy();
  if(S.hRango==='hoy') return fecha=>fecha===h;
  if(S.hRango==='semana'){
    // lunes a domingo de la semana actual
    const dia=now.getDay()||7; // 1=lun..7=dom
    const lunes=new Date(now);lunes.setDate(now.getDate()-(dia-1));lunes.setHours(0,0,0,0);
    const domingo=new Date(lunes);domingo.setDate(lunes.getDate()+6);
    return fecha=>{const d=new Date(fecha+'T12:00:00');return d>=lunes&&d<=domingo;};
  }
  if(S.hRango==='mes'){
    const ma=now.getMonth()+1,aa=now.getFullYear();
    return fecha=>{const d=new Date(fecha+'T12:00:00');return d.getMonth()+1===ma&&d.getFullYear()===aa;};
  }
  if(S.hRango==='dia') return fecha=>!S.hFecha||fecha===S.hFecha;
  return ()=>true; // 'todo'
}

function _renderProdDropdown(){

  const fil=[...S.productos]
    .filter(p=>!q||p.nombre.toLowerCase().includes(q))

    drop.style.display='block';

function vPaso1Sig(){if(!S.vCliente.trim()){S.vClienteErr='El nombre del cliente es requerido';renderNow();return}S.vClienteErr='';S.vPaso=2;renderNow()}

function agregarAlCarrito(){
  const pid=parseInt(S.vSelProdId),cant=parseInt(S.vSelCant)||0;
  const prod=S.productos.find(p=>p.id===pid);
  if(!prod||cant<1){S.vSelErr='Selecciona producto y cantidad';renderNow();return}
  const sd=stockDisp(pid);
  if(cant>sd){S.vSelErr=`Stock insuficiente. Disponible: ${sd}`;renderNow();return}
  const precioCustom=S.vUsarPrecioCustom&&parseFloat(S.vPrecioCustom)>0?parseFloat(S.vPrecioCustom):null;
  if(S._editUID){
    S.vCarrito=S.vCarrito.map(i=>i.uid===S._editUID?{...i,productoId:pid,nivel:S.vSelNivel,cantidad:cant,precioCustom:precioCustom}:i);
    S._editUID=null;toast('✅ Producto actualizado');
  } else {
    const idx=(!precioCustom)?S.vCarrito.findIndex(i=>i.productoId===pid&&i.nivel===S.vSelNivel&&!i.precioCustom):-1;
    if(idx>=0){S.vCarrito=S.vCarrito.map((i,j)=>j===idx?{...i,cantidad:i.cantidad+cant}:i);toast(`✅ Cantidad actualizada`);}
    else{S.vCarrito=[...S.vCarrito,{uid:Date.now(),productoId:pid,nivel:S.vSelNivel,cantidad:cant,precioCustom:precioCustom}];toast(`✅ ${prod.nombre} agregado`);}
  }
  S.vSheetAdd=false;S.vSelProdId='';S.vSelCant=1;S.vSelErr='';S.vPrecioCustom='';S.vUsarPrecioCustom=false;S._prodQ='';S._prodDrop=false;renderNow();
}
function cambiarCant(idx,delta){
  const item=S.vCarrito[idx];const prod=S.productos.find(p=>p.id===item.productoId);
  const nc=item.cantidad+delta;
  if(nc<1){if(confirm(`¿Quitar ${prod?prod.nombre:'este producto'}?`))quitarItem(idx);return}
  const en=S.vCarrito.filter((i,j)=>i.productoId===item.productoId&&j!==idx).reduce((s,i)=>s+i.cantidad,0);
  if(nc+en>prod.stock){toast(`⚠️ Máx: ${prod.stock} uds`);return}
  S.vCarrito=S.vCarrito.map((i,j)=>j===idx?{...i,cantidad:nc}:i);renderNow();
}
function editarItem(idx){const item=S.vCarrito[idx];S._editUID=item.uid;S.vSelProdId=String(item.productoId);S.vSelNivel=item.nivel;S.vSelCant=item.cantidad;S.vSelErr='';S.vSheetAdd=true;renderNow()}
function quitarItem(idx){const p=S.productos.find(x=>x.id===S.vCarrito[idx].productoId);S.vCarrito=S.vCarrito.filter((_,j)=>j!==idx);toast(`🗑️ ${p?p.nombre:''} quitado`);renderNow()}
function confirVenta(){
  const ct=carritoTotal();const totalC=ct.total,ganC=ct.ganancia;
  // Pago puede ser mayor al total (cliente paga de más / redondeo)
  const pagado=parseFloat(S.vMontoPagado)||0;
  const saldo=Math.max(0,totalC-pagado); // 0 si pagó igual o más
  const excedente=Math.max(0,pagado-totalC); // sobrepago
  // Ganancia = ganancia base del carrito (calculada sobre precios reales cobrados)
  // Si pagó más, el excedente también es ganancia
  const gananciaFinal=ganC+excedente;
  const cObj=S.clientes.find(c=>c.nombre===S.vCliente.trim());
  const v={
    id:Date.now(),fecha:S.vFecha,cliente:S.vCliente.trim(),
    clienteId:cObj?cObj.id:null,
    items:S.vCarrito.map(item=>{
      const p=S.productos.find(x=>x.id===item.productoId);
      const precio=item.precioCustom!=null?item.precioCustom:pV(p,item.nivel);
      return{
        productoId:item.productoId,nombre:p.nombre,
        nivel:item.precioCustom!=null?null:item.nivel, // null si precio custom
        cantidad:item.cantidad,precioUnitario:precio,
        esEspecial:item.precioCustom!=null
      };
    }),
    producto:S.vCarrito.map(i=>S.productos.find(x=>x.id===i.productoId)?.nombre||'').join(', '),
    productoId:S.vCarrito[0].productoId,
    nivel:S.vCarrito[0].precioCustom!=null?null:S.vCarrito[0].nivel,
    cantidad:S.vCarrito.reduce((s,i)=>s+i.cantidad,0),
    totalVenta:totalC,
    montoPagado:Math.min(pagado,totalC+excedente), // guarda lo real pagado
    saldo:saldo,
    excedente:excedente>0?excedente:0,
    gananciaReal:gananciaFinal,
  };
  S.vCarrito.forEach(item=>{
    S.productos=S.productos.map(p=>p.id===item.productoId?{...p,stock:p.stock-item.cantidad}:p);
  });
  S.ventas=[...S.ventas,v];saveAll();
  S.vGuardada=v;S.vPaso=3;toast('🎉 ¡Venta registrada!');renderNow();
}

function confirAbono(){
  const m=parseFloat(S.hAbono);if(!m||m<=0)return;
  const vOrig=S.hSheetAb;
  const totalPagado=vOrig.montoPagado+m;
  const nuevoSaldo=Math.max(0,vOrig.totalVenta-totalPagado);
  const excedente=Math.max(0,totalPagado-vOrig.totalVenta);
  // Si pagó de más, el excedente aumenta la ganancia real
  const nuevaGanancia=(vOrig.gananciaReal||0)+excedente;
  S.ventas=S.ventas.map(v=>v.id===vOrig.id?{
    ...v,
    montoPagado:totalPagado,
    saldo:nuevoSaldo,
    excedente:(v.excedente||0)+excedente,
    gananciaReal:nuevaGanancia
  }:v);
  saveAll();toast(`💵 Abono de ${fmt(m)} registrado`);S.hSheetAb=null;S.hAbono='';renderNow();
}
function eliminarV(id){
  if(!confirm('¿Eliminar esta venta? El stock será restaurado.'))return;
  const v=S.ventas.find(x=>x.id===id);
  if(v){if(v.items)v.items.forEach(i=>S.productos=S.productos.map(p=>p.id===i.productoId?{...p,stock:p.stock+i.cantidad}:p));
  else S.productos=S.productos.map(p=>p.id===v.productoId?{...p,stock:p.stock+v.cantidad}:p);}
  S.ventas=S.ventas.filter(x=>x.id!==id);saveAll();toast('🗑️ Venta eliminada y stock restaurado');renderNow();
}

function rRep(){

  const mododia=!!S.rFecha;
  const vm=mododia
    ? S.ventas.filter(v=>v.fecha===S.rFecha)
    : S.ventas.filter(v=>{const d=new Date(v.fecha);return d.getMonth()+1===S.rMes&&d.getFullYear()===S.rAnio});
  const tV=sum(vm,'totalVenta'),tC=sum(vm,'montoPagado'),tG=sum(vm,'gananciaReal');
  // Calcular por producto
  const porP={};
  vm.forEach(v=>{
    if(v.items)v.items.forEach(i=>{if(!porP[i.nombre])porP[i.nombre]={nombre:i.nombre,uds:0,ventas:0,ganancia:0};porP[i.nombre].uds+=i.cantidad;porP[i.nombre].ventas+=i.precioUnitario*i.cantidad;});
    else{if(!porP[v.producto])porP[v.producto]={nombre:v.producto,uds:0,ventas:0,ganancia:0};porP[v.producto].uds+=v.cantidad;porP[v.producto].ventas+=v.totalVenta;}
  });
  vm.forEach(v=>{
    if(v.items)v.items.forEach(i=>{const p=S.productos.find(x=>x.id===i.productoId);if(p&&porP[i.nombre]){const b=calcP(p).base;porP[i.nombre].ganancia+=(i.precioUnitario-b)*i.cantidad;}});
    else if(porP[v.producto])porP[v.producto].ganancia+=v.gananciaReal;
  });
  const lista=Object.values(porP).sort((a,b)=>b.ventas-a.ventas);
  const pct=tV>0?Math.round(tC/tV*100):0;
  // Label del período activo
  const periodoLabel=mododia
    ? new Date(S.rFecha+'T12:00:00').toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
    : `${MESES[S.rMes-1]} ${S.rAnio}`;
  const esHoy=S.rFecha===hoy();
  return`
  <!-- Selector período -->
  <div class="card" style="margin-bottom:12px">
    <!-- Tabs Día / Mes -->
    <div style="display:flex;gap:0;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:12px">
      <button onclick="S.rFecha='';render()" style="flex:1;padding:7px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;background:${!mododia?'var(--indigo)':'transparent'};color:${!mododia?'#fff':'var(--muted)'}">📆 Por mes</button>
      <button onclick="if(!S.rFecha)S.rFecha=hoy();render()" style="flex:1;padding:7px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;background:${mododia?'var(--indigo)':'transparent'};color:${mododia?'#fff':'var(--muted)'}">📅 Por día</button>
    </div>
    ${!mododia?`
    <div class="grid-2b">
      <div class="field" style="margin-bottom:0"><label>Mes</label>
      <select class="input" onchange="S.rMes=parseInt(this.value);render()">${MESES.map((m,i)=>`<option value="${i+1}"${S.rMes===i+1?' selected':''}>${m}</option>`).join('')}</select></div>
      <div class="field" style="margin-bottom:0"><label>Año</label>
      <select class="input" onchange="S.rAnio=parseInt(this.value);render()">${[2024,2025,2026,2027].map(a=>`<option${S.rAnio===a?' selected':''}>${a}</option>`).join('')}</select></div>
    </div>`:`
    <div style="display:flex;gap:8px;align-items:center">
      <input class="input" type="date" value="${S.rFecha}" onchange="S.rFecha=this.value;render()" style="flex:1;font-size:13px">
      <button class="btn btn-sm btn-outline-primary" onclick="S.rFecha=hoy();render()" style="white-space:nowrap;flex-shrink:0">📅 Hoy</button>
    </div>`}
  </div>

  <!-- Resumen hoy en tiempo real (solo modo mes y si hay ventas hoy) -->
  ${(!mododia&&!esHoy)?(()=>{const vh=S.ventas.filter(v=>v.fecha===hoy());const th=sum(vh,'totalVenta');const gh=sum(vh,'gananciaReal');
    return vh.length>0?`<div style="background:linear-gradient(135deg,rgba(30,27,75,.8),rgba(49,46,129,.6));border:1px solid rgba(99,102,241,.3);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;cursor:pointer" onclick="S.rFecha=hoy();render()">
    <div style="font-size:10px;color:rgba(199,194,240,.7);font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px">⚡ Hoy — toca para ver detalle</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:22px;font-weight:900;color:#fff">${fmt(th)}</div>
      <div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:1px">${vh.length} venta${vh.length!==1?'s':''} hoy</div></div>
      <div style="text-align:right"><div style="font-size:10px;color:rgba(52,211,153,.7);margin-bottom:2px">Ganancia hoy</div>
      <div style="font-weight:900;font-size:18px;color:#34d399">${fmt(gh)}</div></div>
    </div></div>`:'';
  })():''}

  <!-- Hero del período seleccionado -->
  <div class="hero" style="margin-bottom:16px">
    <div style="font-size:12px;opacity:.65;font-weight:600;margin-bottom:2px;text-transform:capitalize">${periodoLabel}${esHoy?' ⚡':''}</div>
    <div style="font-size:40px;font-weight:900;letter-spacing:-1.5px;line-height:1">${fmt(tV)}</div>
    <div style="opacity:.6;font-size:12px;margin-top:4px">${vm.length} transacción${vm.length!==1?'es':''}</div>
    <div style="margin-top:14px;display:flex;gap:0;background:rgba(0,0,0,.25);border-radius:12px;overflow:hidden">
      ${[['✅ Cobrado',fmt(tC)],['🏆 Ganancia',fmt(tG)],['⏳ Cartera',fmt(tV-tC)]].map(([k,v],i)=>`
      <div style="flex:1;padding:10px 8px;${i>0?'border-left:1px solid rgba(255,255,255,.1)':''}">
        <div style="font-size:10px;opacity:.6;margin-bottom:2px">${k}</div>
        <div style="font-weight:800;font-size:14px">${v}</div>
      </div>`).join('')}
    </div>
  </div>

  <div class="grid-2">
    ${sc('✅','Pagadas',vm.filter(v=>v.montoPagado>=v.totalVenta).length,'var(--green)',`de ${vm.length}`)}
    ${sc('⏳','Pendientes',vm.filter(v=>v.montoPagado<v.totalVenta).length,'var(--red)')}
  </div>

  ${vm.length>0?`<div class="card" style="padding:14px 16px;margin-bottom:12px">
    <div class="section-title" style="margin-bottom:10px">📊 Tasa de cobro</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:12.5px;color:var(--text2)">Cobrado vs vendido</span>
      <b style="color:${pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--red)'}">${pct}%</b>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`:''}

  ${lista.length?`<p class="section-title">📦 Por producto</p>
  ${lista.map(p=>{const pct2=tV>0?Math.round(p.ventas/tV*100):0;
    return`<div class="card" style="padding:14px 16px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.nombre}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${p.uds} unidades</div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:10px">
        <div style="font-weight:900;color:var(--indigo);font-size:17px">${fmt(p.ventas)}</div>
        <div style="font-size:12px;color:var(--green);font-weight:700">+${fmt(p.ganancia)}</div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct2}%"></div></div>
    <div style="font-size:11px;color:var(--muted);text-align:right;margin-top:3px">${pct2}%</div>
  </div>`;}).join('')}`:`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">Sin ventas — ${periodoLabel}</div></div>`}`;
}

// ═══════════════════════════════════════════════
// INICIO — cargar datos antes de renderizar
// ═══════════════════════════════════════════════
renderNow(); // muestra pantalla de carga
loadAll();   // carga IndexedDB, luego renderNow() otra vez con datos
</script>
</body>
</html>
